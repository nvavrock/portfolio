apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-dashboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: weather-dashboard
  template:
    metadata:
      labels:
        app: weather-dashboard
    spec:
      containers:
        - name: weather-dashboard
          image: weather-dashboard:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: WEATHER_CITY
              value: "London"
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-openweather
                  key: OPENWEATHER_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
