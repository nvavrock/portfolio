apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weather-dashboard
  labels:
    app: weather-dashboard
    # Set this to match your kube-prometheus-stack Helm release so Prometheus picks it up.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: weather-dashboard
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
