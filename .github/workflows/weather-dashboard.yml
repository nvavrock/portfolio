name: weather-dashboard

on:
  push:
    paths:
      - "cicd/weather-dashboard/**"
      - ".github/workflows/weather-dashboard.yml"
  pull_request:
    paths:
      - "cicd/weather-dashboard/**"
      - ".github/workflows/weather-dashboard.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: weather-dashboard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd/weather-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cicd/weather-dashboard/app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r app/requirements.txt

      - name: Ruff
        run: ruff check app

      - name: Pytest
        run: pytest -q

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/weather-dashboard
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cicd/weather-dashboard
          file: cicd/weather-dashboard/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl and kustomize
        uses: azure/setup-kubectl@v4
      - name: Install kustomize
        run: |
          set -euo pipefail
          KUSTOMIZE_VERSION=5.5.0
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin

      - name: Deploy to cluster
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          KUBECONFIG: ${{ runner.temp }}/kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_B64:-}" ]; then
            echo "KUBECONFIG_B64 is not set; skipping deploy."
            exit 0
          fi
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$KUBECONFIG"
          cd cicd/weather-dashboard/k8s
          IMAGE="ghcr.io/${{ github.repository }}/weather-dashboard:${{ github.sha }}"
          kustomize edit set image weather-dashboard="${IMAGE}"
          kubectl apply -k .
          kubectl rollout status deployment/weather-dashboard --timeout=300s
